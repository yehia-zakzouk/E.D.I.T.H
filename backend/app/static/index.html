<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EDITH — AI Code Analysis</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
  /* ── Reset & base ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:       #0d1117;
    --surface:  #161b22;
    --border:   #30363d;
    --text:     #e6edf3;
    --muted:    #8b949e;
    --accent:   #58a6ff;
    --green:    #3fb950;
    --orange:   #d29922;
    --purple:   #bc8cff;
    --red:      #f85149;
    --radius:   8px;
    --font:     'Segoe UI', system-ui, -apple-system, sans-serif;
    --mono:     'Cascadia Code', 'Fira Code', 'JetBrains Mono', monospace;
  }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); font-size: 14px; }
  body { display: flex; flex-direction: column; overflow: hidden; }

  /* ── Top bar ── */
  #topbar {
    display: flex; align-items: center; gap: 12px; padding: 8px 16px;
    background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0;
  }
  #topbar h1 { font-size: 16px; font-weight: 600; color: var(--accent); letter-spacing: 0.5px; }
  #topbar h1 span { color: var(--muted); font-weight: 400; }
  #project-input { flex: 1; max-width: 400px; }
  #project-input input {
    width: 100%; padding: 6px 12px; border: 1px solid var(--border); border-radius: var(--radius);
    background: var(--bg); color: var(--text); font-size: 13px; outline: none;
  }
  #project-input input:focus { border-color: var(--accent); }
  #scan-btn, #rescan-btn {
    padding: 6px 16px; border: none; border-radius: var(--radius); cursor: pointer;
    font-size: 13px; font-weight: 500; transition: opacity .15s;
  }
  #scan-btn { background: var(--accent); color: #fff; }
  #rescan-btn { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
  #scan-btn:hover, #rescan-btn:hover { opacity: .85; }
  #status {
    font-size: 12px; color: var(--muted); margin-left: auto; white-space: nowrap;
  }
  #status.loading { color: var(--orange); }
  #status.ok { color: var(--green); }
  #status.error { color: var(--red); }

  /* ── Main layout ── */
  #main {
    display: flex; flex: 1; overflow: hidden;
  }
  .panel {
    display: flex; flex-direction: column; overflow: hidden;
    border-right: 1px solid var(--border);
  }
  .panel:last-child { border-right: none; }
  .panel-header {
    padding: 8px 12px; font-size: 11px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.8px; color: var(--muted); background: var(--surface);
    border-bottom: 1px solid var(--border); flex-shrink: 0;
  }
  .panel-content { flex: 1; overflow: auto; padding: 0; }

  /* ── Left: File tree ── */
  #file-panel { width: 260px; min-width: 200px; }
  .tree-node {
    padding: 3px 8px 3px 16px; cursor: pointer; display: flex; align-items: center; gap: 6px;
    font-size: 13px; color: var(--text); transition: background .1s; white-space: nowrap;
  }
  .tree-node:hover { background: rgba(88,166,255,.08); }
  .tree-node .icon { font-size: 14px; flex-shrink: 0; width: 18px; text-align: center; }
  .tree-node .icon.dir { color: var(--accent); }
  .tree-node .icon.file { color: var(--muted); }
  .tree-node .icon.sym { color: var(--purple); font-size: 10px; }
  .tree-node .name { overflow: hidden; text-overflow: ellipsis; }
  .tree-node .badge {
    font-size: 10px; padding: 1px 5px; border-radius: 4px; background: var(--border); color: var(--muted);
    margin-left: auto;
  }
  .tree-children { display: none; }
  .tree-children.open { display: block; }
  .tree-node.indent-1 { padding-left: 28px; }
  .tree-node.indent-2 { padding-left: 40px; }
  .tree-node.indent-3 { padding-left: 52px; }

  /* ── Center: Graph ── */
  #graph-panel { flex: 1; min-width: 300px; position: relative; }
  #graph-svg { width: 100%; height: 100%; }
  #graph-svg .link { stroke: var(--border); stroke-width: 1.5; opacity: .6; }
  #graph-svg .link:hover { stroke: var(--accent); opacity: 1; }
  #graph-svg .node circle { stroke: var(--surface); stroke-width: 2; cursor: pointer; }
  #graph-svg .node:hover circle { stroke: var(--accent); }
  #graph-svg .node text {
    fill: var(--text); font-size: 10px; pointer-events: none;
    text-shadow: 0 1px 3px rgba(0,0,0,.8);
  }
  #graph-svg .node.type-file circle { fill: var(--accent); }
  #graph-svg .node.type-class circle { fill: var(--green); }
  #graph-svg .node.type-function circle { fill: var(--orange); }
  #graph-svg .node.type-method circle { fill: var(--purple); }
  #graph-svg .node.type-module circle { fill: var(--muted); }
  .graph-tooltip {
    position: absolute; padding: 8px 12px; background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); font-size: 12px; pointer-events: none; display: none;
    box-shadow: 0 4px 12px rgba(0,0,0,.4); z-index: 100;
  }
  #graph-zoom-controls {
    position: absolute; bottom: 12px; right: 12px; display: flex; gap: 4px;
  }
  #graph-zoom-controls button {
    width: 32px; height: 32px; border: 1px solid var(--border); border-radius: var(--radius);
    background: var(--surface); color: var(--text); cursor: pointer; font-size: 16px;
    display: flex; align-items: center; justify-content: center;
  }
  #graph-zoom-controls button:hover { background: rgba(88,166,255,.15); }

  /* ── Right: Chat ── */
  #chat-panel { width: 380px; min-width: 300px; }
  #chat-messages { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 8px; }
  .msg { padding: 8px 12px; border-radius: var(--radius); max-width: 95%; line-height: 1.5; font-size: 13px; }
  .msg.user { background: rgba(88,166,255,.12); align-self: flex-end; }
  .msg.edith { background: var(--surface); align-self: flex-start; }
  .msg.system { background: rgba(187,128,9,.12); align-self: center; font-size: 12px; color: var(--orange); }
  .msg.error { background: rgba(248,81,73,.12); align-self: center; color: var(--red); font-size: 12px; }
  .msg .intent-tag {
    font-size: 10px; color: var(--muted); display: block; margin-bottom: 4px;
  }
  .msg pre { background: rgba(0,0,0,.3); padding: 8px; border-radius: 4px; overflow-x: auto; font-family: var(--mono); font-size: 12px; margin: 6px 0; }
  .msg code { font-family: var(--mono); font-size: 12px; background: rgba(0,0,0,.3); padding: 1px 4px; border-radius: 3px; }
  .typing-indicator { display: flex; gap: 4px; padding: 4px 0; }
  .typing-indicator span { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); animation: bounce 1.2s infinite; }
  .typing-indicator span:nth-child(2) { animation-delay: .2s; }
  .typing-indicator span:nth-child(3) { animation-delay: .4s; }
  @keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }

  #chat-input-area {
    display: flex; gap: 8px; padding: 8px 12px; border-top: 1px solid var(--border);
    background: var(--surface); flex-shrink: 0;
  }
  #chat-input {
    flex: 1; padding: 8px 12px; border: 1px solid var(--border); border-radius: var(--radius);
    background: var(--bg); color: var(--text); font-size: 13px; outline: none; resize: none;
    font-family: var(--font); max-height: 80px;
  }
  #chat-input:focus { border-color: var(--accent); }
  #chat-send {
    padding: 8px 16px; border: none; border-radius: var(--radius); background: var(--accent);
    color: #fff; cursor: pointer; font-weight: 500; font-size: 13px; align-self: flex-end;
  }
  #chat-send:hover { opacity: .85; }
  #chat-send:disabled { opacity: .4; cursor: not-allowed; }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted); }

  /* ── Responsive adjustments ── */
  @media (max-width: 900px) {
    #main { flex-direction: column; }
    #file-panel, #chat-panel { width: 100%; min-width: unset; height: 200px; }
    #graph-panel { height: 300px; }
  }
</style>
</head>
<body>

<!-- ═══ Top Bar ═══ -->
<div id="topbar">
  <h1>EDITH <span>· AI Code Analysis</span></h1>
  <div id="project-input">
    <input id="path-input" type="text" placeholder="Enter project path... (e.g. D:\\E.D.I.T.H\\backend)" value="D:\E.D.I.T.H\backend">
  </div>
  <button id="scan-btn">Load</button>
  <button id="rescan-btn" style="display:none">↻ Rescan</button>
  <div id="status">Ready</div>
</div>

<!-- ═══ Main Panels ═══ -->
<div id="main">

  <!-- Left: File Tree -->
  <div id="file-panel" class="panel">
    <div class="panel-header">📁 Files</div>
    <div class="panel-content" id="file-tree"></div>
  </div>

  <!-- Center: Graph -->
  <div id="graph-panel" class="panel">
    <div class="panel-header">🔗 Knowledge Graph</div>
    <div class="panel-content" style="position:relative">
      <svg id="graph-svg"></svg>
      <div class="graph-tooltip" id="graph-tooltip"></div>
      <div id="graph-zoom-controls">
        <button id="zoom-in">+</button>
        <button id="zoom-out">−</button>
        <button id="zoom-reset">⟲</button>
      </div>
    </div>
  </div>

  <!-- Right: Chat -->
  <div id="chat-panel" class="panel">
    <div class="panel-header">💬 Chat</div>
    <div id="chat-messages" class="panel-content">
      <div class="msg edith">
        👋 Welcome to EDITH! Enter a project path above and click <strong>Load</strong> to get started.
      </div>
    </div>
    <div id="chat-input-area">
      <textarea id="chat-input" placeholder="Ask about the codebase..." rows="1" disabled></textarea>
      <button id="chat-send" disabled>Send</button>
    </div>
  </div>

</div>

<script>
// ═══════════════════════════════════════════════════════════════════
//  State
// ═══════════════════════════════════════════════════════════════════

const state = {
  projectPath: null,
  projectName: null,
  ws: null,
  isStreaming: false,
};

const $ = (id) => document.getElementById(id);
const statusEl = $('status');
const pathInput = $('path-input');
const scanBtn = $('scan-btn');
const rescanBtn = $('rescan-btn');
const fileTreeEl = $('file-tree');
const graphSvg = $('graph-svg');
const tooltip = $('graph-tooltip');
const chatMessages = $('chat-messages');
const chatInput = $('chat-input');
const chatSend = $('chat-send');

// ═══════════════════════════════════════════════════════════════════
//  Status helpers
// ═══════════════════════════════════════════════════════════════════

function setStatus(text, type = 'ok') {
  statusEl.textContent = text;
  statusEl.className = type;
}

function addChatMessage(html, cls = 'edith') {
  const div = document.createElement('div');
  div.className = `msg ${cls}`;
  div.innerHTML = html;
  chatMessages.appendChild(div);
  chatMessages.scrollTop = chatMessages.scrollHeight;
}

function showTyping() {
  const div = document.createElement('div');
  div.className = 'msg edith';
  div.id = 'typing-indicator';
  div.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';
  chatMessages.appendChild(div);
  chatMessages.scrollTop = chatMessages.scrollHeight;
}

function hideTyping() {
  const el = $('typing-indicator');
  if (el) el.remove();
}

// ═══════════════════════════════════════════════════════════════════
//  WebSocket chat
// ═══════════════════════════════════════════════════════════════════

function connectWebSocket() {
  if (state.ws) {
    state.ws.close();
  }
  const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const host = location.host;
  state.ws = new WebSocket(`${protocol}//${host}/ws/chat`);

  state.ws.onmessage = (event) => {
    const data = JSON.parse(event.data);
    switch (data.type) {
      case 'system':
        hideTyping();
        addChatMessage(`<em>${data.message}</em>`, 'system');
        if (data.project) {
          state.projectName = data.project.name;
          updateUI(data.project);
        }
        break;
      case 'intent':
        hideTyping();
        const tag = data.target ? `[${data.intent}] → ${data.target}` : `[${data.intent}]`;
        addChatMessage(`<span class="intent-tag">${tag}</span>`, 'edith');
        showTyping();
        break;
      case 'chunk':
        hideTyping();
        let msgEl = chatMessages.querySelector('.msg.streaming:last-child');
        if (!msgEl) {
          msgEl = document.createElement('div');
          msgEl.className = 'msg edith streaming';
          chatMessages.appendChild(msgEl);
        }
        msgEl.textContent += data.text;
        chatMessages.scrollTop = chatMessages.scrollHeight;
        break;
      case 'done':
        hideTyping();
        const streamEl = chatMessages.querySelector('.msg.streaming:last-child');
        if (streamEl) streamEl.classList.remove('streaming');
        state.isStreaming = false;
        chatInput.disabled = false;
        chatSend.disabled = false;
        chatInput.focus();
        break;
      case 'error':
        hideTyping();
        addChatMessage(data.message, 'error');
        state.isStreaming = false;
        chatInput.disabled = false;
        chatSend.disabled = false;
        break;
    }
  };

  state.ws.onclose = () => {
    if (!state.isStreaming) {
      // Reconnect after 3 seconds
      setTimeout(() => { if (state.projectPath) connectWebSocket(); }, 3000);
    }
  };

  state.ws.onerror = () => {
    addChatMessage('Connection lost. Retrying...', 'error');
  };
}

function sendChatMessage(text) {
  if (!state.ws || state.ws.readyState !== WebSocket.OPEN) {
    addChatMessage('Not connected. Wait for connection...', 'error');
    return;
  }
  addChatMessage(escapeHtml(text), 'user');
  state.isStreaming = true;
  chatInput.disabled = true;
  chatSend.disabled = true;
  state.ws.send(text);
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// ═══════════════════════════════════════════════════════════════════
//  Scan project (REST)
// ═══════════════════════════════════════════════════════════════════

async function scanProject(path, force = false) {
  setStatus('Scanning...', 'loading');
  try {
    const res = await fetch('/scan', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ path, force }),
    });
    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.detail || 'Scan failed');
    }
    const data = await res.json();
    state.projectPath = path;
    state.projectName = data.name;
    updateUI(data);
    setStatus(`Loaded: ${data.name} (${data.file_count} files)`, 'ok');

    // Tell WebSocket about the project
    if (state.ws && state.ws.readyState === WebSocket.OPEN) {
      state.ws.send(`//project ${path}`);
    }

    // Load file tree and graph
    loadFileTree(path);
    loadGraph(path);

    // Enable chat
    chatInput.disabled = false;
    chatSend.disabled = false;
    chatInput.placeholder = 'Ask about the codebase...';
    chatInput.focus();

    addChatMessage(`📦 <strong>${data.name}</strong> loaded — ${data.file_count} files, ${data.symbol_count} symbols, ${data.node_count} graph nodes`, 'system');
    if (data.cached) {
      addChatMessage('⚡ Loaded from cache (use Rescan to force re-analysis)', 'system');
    }

    return data;
  } catch (err) {
    setStatus(`Error: ${err.message}`, 'error');
    addChatMessage(`Error: ${err.message}`, 'error');
    return null;
  }
}

function updateUI(data) {
  scanBtn.style.display = 'none';
  rescanBtn.style.display = 'inline-block';
}

// ═══════════════════════════════════════════════════════════════════
//  File tree
// ═══════════════════════════════════════════════════════════════════

async function loadFileTree(path) {
  try {
    const res = await fetch(`/project/files?path=${encodeURIComponent(path)}`);
    if (!res.ok) return;
    const tree = await res.json();
    renderFileTree(tree);
  } catch (err) {
    fileTreeEl.innerHTML = `<div style="padding:12px;color:var(--red)">Error loading files</div>`;
  }
}

function renderFileTree(nodes, depth = 0) {
  fileTreeEl.innerHTML = '';
  const ul = document.createElement('div');
  buildTreeNodes(nodes, ul, depth);
  fileTreeEl.appendChild(ul);
}

function buildTreeNodes(nodes, parent, depth) {
  for (const node of nodes) {
    const div = document.createElement('div');
    div.className = `tree-node indent-${depth}`;

    if (node.type === 'directory') {
      div.innerHTML = `<span class="icon dir">📁</span><span class="name">${escapeHtml(node.name)}</span>`;
      div.addEventListener('click', () => {
        const children = div.nextElementSibling;
        if (children) {
          children.classList.toggle('open');
          div.querySelector('.icon.dir').textContent = children.classList.contains('open') ? '📂' : '📁';
        }
      });
      parent.appendChild(div);
      const childContainer = document.createElement('div');
      childContainer.className = 'tree-children';
      buildTreeNodes(node.children || [], childContainer, depth + 1);
      parent.appendChild(childContainer);
    } else {
      const symbols = node.symbols ? ` (${node.symbols.length} sym)` : '';
      div.innerHTML = `<span class="icon file">📄</span><span class="name">${escapeHtml(node.name)}</span><span class="badge">${symbols || 'file'}</span>`;
      div.addEventListener('click', () => {
        if (node.symbols && node.symbols.length > 0) {
          const children = div.nextElementSibling;
          if (children) {
            children.classList.toggle('open');
          }
        }
      });
      parent.appendChild(div);

      // Show symbols as children
      if (node.symbols && node.symbols.length > 0) {
        const symContainer = document.createElement('div');
        symContainer.className = 'tree-children';
        for (const sym of node.symbols) {
          const symDiv = document.createElement('div');
          const kindIcon = sym.kind === 'class' ? '🏛' : sym.kind === 'function' ? '⚙' : '🔧';
          symDiv.className = `tree-node indent-${depth + 1}`;
          symDiv.innerHTML = `<span class="icon sym">${kindIcon}</span><span class="name">${escapeHtml(sym.name)}</span><span class="badge">${sym.kind}</span>`;
          symContainer.appendChild(symDiv);
        }
        parent.appendChild(symContainer);
      }
    }
  }
}

// ═══════════════════════════════════════════════════════════════════
//  Graph (D3.js force-directed)
// ═══════════════════════════════════════════════════════════════════

let simulation = null;

async function loadGraph(path) {
  try {
    const res = await fetch(`/project/graph?path=${encodeURIComponent(path)}`);
    if (!res.ok) return;
    const data = await res.json();
    renderGraph(data);
  } catch (err) {
    console.error('Graph load error:', err);
  }
}

function renderGraph(data) {
  const svg = d3.select('#graph-svg');
  svg.selectAll('*').remove();

  if (!data.nodes || data.nodes.length === 0) {
    svg.append('text')
      .attr('x', '50%').attr('y', '50%')
      .attr('text-anchor', 'middle').attr('fill', 'var(--muted)')
      .style('font-size', '14px')
      .text('No graph data — scan a project first');
    return;
  }

  const container = document.getElementById('graph-panel');
  const width = container.clientWidth - 2;
  const height = container.clientHeight - 32;

  svg.attr('viewBox', [0, 0, width, height]);

  const g = svg.append('g');

  // Zoom
  const zoom = d3.zoom()
    .scaleExtent([0.1, 4])
    .on('zoom', (event) => g.attr('transform', event.transform));
  svg.call(zoom);

  document.getElementById('zoom-in').onclick = () => zoom.scaleBy(svg.transition().duration(300), 1.3);
  document.getElementById('zoom-out').onclick = () => zoom.scaleBy(svg.transition().duration(300), 0.7);
  document.getElementById('zoom-reset').onclick = () => svg.transition().duration(300).call(zoom.transform, d3.zoomIdentity);

  // Node color by type
  const colorMap = {
    file: '#58a6ff', class: '#3fb950', function: '#d29922',
    method: '#bc8cff', module: '#8b949e',
  };

  // Edges
  const link = g.append('g')
    .selectAll('line')
    .data(data.edges)
    .join('line')
    .attr('class', 'link')
    .attr('stroke-opacity', d => d.label === 'imports' ? 0.3 : 0.6);

  // Nodes
  const node = g.append('g')
    .selectAll('g')
    .data(data.nodes)
    .join('g')
    .attr('class', d => `node type-${d.type}`)
    .call(d3.drag()
      .on('start', (event, d) => {
        if (!event.active) simulation.alphaTarget(0.3).restart();
        d.fx = d.x;
        d.fy = d.y;
      })
      .on('drag', (event, d) => {
        d.fx = event.x;
        d.fy = event.y;
      })
      .on('end', (event, d) => {
        if (!event.active) simulation.alphaTarget(0);
        d.fx = null;
        d.fy = null;
      })
    );

  node.append('circle')
    .attr('r', d => d.type === 'file' ? 6 : d.type === 'class' ? 5 : 4)
    .attr('fill', d => colorMap[d.type] || '#8b949e');

  node.append('text')
    .text(d => d.label.length > 20 ? d.label.slice(0, 18) + '…' : d.label)
    .attr('x', 10)
    .attr('y', 4);

  // Tooltip
  node.on('mouseenter', (event, d) => {
    tooltip.style.display = 'block';
    tooltip.innerHTML = `<strong>${d.label}</strong><br><span style="color:var(--muted)">${d.type}</span>`;
    const rect = container.getBoundingClientRect();
    tooltip.style.left = (event.clientX - rect.left + 12) + 'px';
    tooltip.style.top = (event.clientY - rect.top - 10) + 'px';
  }).on('mousemove', (event) => {
    const rect = container.getBoundingClientRect();
    tooltip.style.left = (event.clientX - rect.left + 12) + 'px';
    tooltip.style.top = (event.clientY - rect.top - 10) + 'px';
  }).on('mouseleave', () => {
    tooltip.style.display = 'none';
  });

  // Simulation
  simulation = d3.forceSimulation(data.nodes)
    .force('link', d3.forceLink(data.edges).id(d => d.id).distance(80))
    .force('charge', d3.forceManyBody().strength(-200))
    .force('center', d3.forceCenter(width / 2, height / 2))
    .force('collision', d3.forceCollide().radius(20))
    .on('tick', () => {
      link
        .attr('x1', d => d.source.x)
        .attr('y1', d => d.source.y)
        .attr('x2', d => d.target.x)
        .attr('y2', d => d.target.y);
      node
        .attr('transform', d => `translate(${d.x},${d.y})`);
    });

  // Click node to highlight
  node.on('click', (event, d) => {
    node.select('circle').attr('stroke-width', 2).attr('stroke', 'var(--surface)');
    d3.select(event.currentTarget).select('circle').attr('stroke-width', 3).attr('stroke', 'var(--accent)');
  });
}

// ═══════════════════════════════════════════════════════════════════
//  Chat input handling
// ═══════════════════════════════════════════════════════════════════

chatInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

chatSend.addEventListener('click', sendMessage);

function sendMessage() {
  const text = chatInput.value.trim();
  if (!text || state.isStreaming) return;
  chatInput.value = '';
  chatInput.style.height = 'auto';
  sendChatMessage(text);
}

// Auto-resize textarea
chatInput.addEventListener('input', () => {
  chatInput.style.height = 'auto';
  chatInput.style.height = Math.min(chatInput.scrollHeight, 80) + 'px';
});

// ═══════════════════════════════════════════════════════════════════
//  Window resize
// ═══════════════════════════════════════════════════════════════════

let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    if (state.projectPath) loadGraph(state.projectPath);
  }, 500);
});

// ═══════════════════════════════════════════════════════════════════
//  Init
// ═══════════════════════════════════════════════════════════════════

scanBtn.addEventListener('click', () => {
  const path = pathInput.value.trim();
  if (path) scanProject(path);
});

rescanBtn.addEventListener('click', () => {
  if (state.projectPath) scanProject(state.projectPath, true);
});

pathInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') scanBtn.click();
});

// Connect WebSocket on load
connectWebSocket();

// Auto-load the default path on first visit
setTimeout(() => {
  const defaultPath = pathInput.value.trim();
  if (defaultPath) scanProject(defaultPath);
}, 500);

</script>
</body>
</html>
